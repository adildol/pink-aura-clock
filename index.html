<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Aura Clock</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center,
          rgba(255, 170, 190, 0.95) 0%,
          rgba(255, 120, 170, 0.88) 18%,
          rgba(210, 110, 255, 0.80) 42%,
          rgba(135, 120, 255, 0.74) 68%,
          rgba(180, 220, 255, 0.72) 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at center,
          rgba(255, 230, 200, 0.28) 0%,
          rgba(255, 190, 220, 0.18) 25%,
          rgba(210, 140, 255, 0.10) 55%,
          rgba(255,255,255,0) 75%);
      filter: blur(40px);
      pointer-events: none;
    }

    .clock {
      position: relative;
      z-index: 1;
      color: white;
      font-weight: 700;
      font-size: clamp(48px, 18vw, 110px);
      letter-spacing: -0.04em;
      text-shadow:
        0 2px 10px rgba(255,255,255,0.10),
        0 8px 30px rgba(255,120,190,0.18);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">00:00</div>

  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hours}:${minutes}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Aura Clock</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;

      /* 🌸 FULL PINK AURA */
      background:
        radial-gradient(circle at center,
          #fff1f5 0%,     /* super soft pink center */
          #ffd6e7 20%,
          #ffb3d1 40%,
          #ff85b5 60%,
          #ff5c9a 80%,
          #ff2f7d 100%   /* deep pink outer */
        );

      position: relative;
    }

    /* ✨ glow layer biar dreamy */
    body::before {
      content: "";
      position: absolute;
      inset: -25%;
      background:
        radial-gradient(circle at center,
          rgba(255, 255, 255, 0.4) 0%,
          rgba(255, 200, 220, 0.25) 30%,
          rgba(255, 150, 200, 0.15) 60%,
          rgba(255, 100, 170, 0.05) 80%,
          transparent 100%
        );
      filter: blur(50px);
      pointer-events: none;
    }

    .clock {
      position: relative;
      z-index: 1;
      color: white;
      font-weight: 700;
      font-size: clamp(50px, 18vw, 110px);
      letter-spacing: -0.04em;
      text-shadow:
        0 4px 20px rgba(255,255,255,0.25),
        0 10px 40px rgba(255, 80, 150, 0.35);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">00:00</div>

  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hours}:${minutes}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>

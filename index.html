<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Pink Aura Clock</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7c9da;
      position: relative;
    }

    /* base soft background wash */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(255, 105, 180, 0.45) 0%,
          rgba(255, 145, 196, 0.28) 18%,
          rgba(255, 210, 228, 0.16) 34%,
          rgba(255, 245, 250, 0.42) 46%,
          rgba(255, 220, 235, 0.18) 58%,
          rgba(247, 201, 218, 0.00) 74%);
      filter: blur(34px);
      transform: scale(1.15);
      pointer-events: none;
    }

    /* extra dreamy outer haze */
    body::after {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.00) 0%,
          rgba(255,255,255,0.05) 28%,
          rgba(255,240,246,0.22) 42%,
          rgba(255,223,234,0.20) 56%,
          rgba(247,201,218,0.00) 74%);
      filter: blur(55px);
      pointer-events: none;
    }

    .clock {
      position: relative;
      z-index: 2;
      color: #ffffff;
      font-weight: 700;
      font-size: clamp(52px, 18vw, 108px);
      letter-spacing: -0.04em;
      text-shadow:
        0 2px 8px rgba(255,255,255,0.20),
        0 8px 28px rgba(255,105,180,0.16);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">00:00</div>

  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hours}:${minutes}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
